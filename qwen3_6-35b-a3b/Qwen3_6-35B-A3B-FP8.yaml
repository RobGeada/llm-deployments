apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime-qwen36-fp8
  annotations:
    openshift.io/display-name: vLLM 18.1 Serving Runtime for Qwen3.6
    opendatahub.io/template-display-name: vLLM 18.1 Serving Runtime for Qwen3.6
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '8080'
    openshift.io/display-name: vLLM 18.1 Serving Runtime for Qwen3.6
  labels:
    opendatahub.io/dashboard: 'true'
  containers:
    - args:
        - '--port=8080'
        - '--model=/mnt/models'
        - '--served-model-name={{.Name}}'
        - '--gpu-memory-utilization=0.9625'
        - '--tensor-parallel-size=4'
        - '--max-model-len=262144'
        - '--max-num-seqs=8'
        - '--reasoning-parser=qwen3'
        - '--enable-auto-tool-choice'
        - '--tool-call-parser=qwen3_coder'
        - '--enable-chunked-prefill'
        - '--enable-prefix-caching'
        - '--language-model-only'
      command:
        - python
        - '-m'
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_CACHE_ROOT
          value: /tmp/
        - name: VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS
          value: "1"
      image: 'quay.io/vllm/automation-vllm:cuda-24515951778'
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 16Gi
      name: shm
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen36-fp8
  labels:
    opendatahub.io/dashboard: 'true'
    networking.kserve.io/visibility: exposed
  annotations:
    openshift.io/display-name: qwen36-fp8
    serving.knative.openshift.io/enablePassthrough: 'true'
    security.opendatahub.io/enable-auth: 'true'
    serving.kserve.io/deploymentMode: RawDeployment
    sidecar.istio.io/inject: 'true'
    sidecar.istio.io/rewriteAppHTTPProbers: 'true'
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ''
      resources:
        limits:
          cpu: '12'
          memory: 48Gi
          nvidia.com/gpu: '4'
        requests:
          cpu: '12'
          memory: 48Gi
          nvidia.com/gpu: '4'
      runtime: vllm-runtime-qwen36-fp8
      storageUri: hf://Qwen/Qwen3.6-35B-A3B-FP8
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                  - g6.12xlarge
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
